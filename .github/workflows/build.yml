name: Build & Release

on:
  push:
    tags:
      - 'v*'       # v1.0, v1.2.3 — запускает сборку и создаёт Release
  workflow_dispatch:   # ручной запуск из вкладки Actions

jobs:
  build:
    name: Build / ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: krep_app-linux
            dist_path: dist/krep_app
          - os: windows-latest
            artifact_name: krep_app-windows
            dist_path: dist/krep_app.exe
          - os: macos-latest
            artifact_name: krep_app-macos
            dist_path: dist/krep_app

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies (including pyinstaller)
        run: uv sync --dev

      - name: Build executable
        run: uv run pyinstaller krep_app.spec --noconfirm --clean

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.dist_path }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    # Только при пуше тега; при workflow_dispatch — пропускаем
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries for clarity
        run: |
          mv artifacts/krep_app-linux/krep_app      artifacts/krep_app-linux
          mv artifacts/krep_app-macos/krep_app      artifacts/krep_app-macos
          mv artifacts/krep_app-windows/krep_app.exe artifacts/krep_app-windows.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/krep_app-linux
            artifacts/krep_app-macos
            artifacts/krep_app-windows.exe
